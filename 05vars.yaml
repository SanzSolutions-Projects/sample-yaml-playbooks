---
- hosts: all
  gather_facts: no
  become: yes

  vars_files:
    - vars.yaml

  tasks:
    - name: Install Apache HTTP Server
      yum:
        name: httpd
        state: present

    - name: Copy index.html file to web root
      template:
        src: index.html
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: '0644'

    - name: Start and enable Apache HTTP Server
      service:
        name: httpd
        state: started
        enabled: yes
...